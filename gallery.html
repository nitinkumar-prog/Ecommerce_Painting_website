<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - NK Art Store</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Lucida Bright";
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
}

.logo img {
  width: 45px;
  margin-right: 10px;
}

.logo::after {
  content: "NK Art Store";
  font-size: 18px;
  font-weight: bold;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  color: white;
  z-index: 1000;
}

/* NAV LINKS */
.nav-links {
  display: flex;
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  position: relative;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #f7110d;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 25px;
  cursor: pointer;
}

/* MOBILE NAV */
@media (max-width: 768px){

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    background: black;
    flex-direction: column;
    display: none;
  }

  .nav-links a {
    padding: 15px;
    border-top: 1px solid #333;
    margin: 0;
  }

  .nav-links.show {
    display: flex;
  }
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px;
  margin-top: 100px;
}

.header h1 {
  font-size: 2.2rem;
  color: #580908;
}

/* FEATURED */
.featured {
  padding: 30px;
  text-align: center;
}

.featured img {
  width: 80%;
  max-width: 600px;
  border-radius: 10px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* REVIEWS */
.reviews {
  background: #f5f5f5;
  padding: 40px;
  text-align: center;
}

.review-box {
  background: white;
  padding: 15px;
  margin: 10px auto;
  max-width: 400px;
  border-radius: 10px;
}

/* FORM */
.form {
  padding: 40px;
  text-align: center;
}

.form input, .form textarea {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  margin: 10px 0;
}

.form button {
  padding: 10px 20px;
  background: darkred;
  color: white;
  border: none;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 600px) {

  .gallery {
    grid-template-columns: 1fr;
  }

  .featured img {
    width: 100%;
  }

  .header h1 {
    font-size: 1.6rem;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

  <div class="logo">
    <img src="Black and White Modern Personal Logo.png">
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="original.html">Original</a>
    <a href="gallery.html">Gallery</a>
    <a href="canvas.html">Canvas</a>
    <a href="about.html">About</a>
  </nav>

</header>

<!-- HEADER -->
<div class="header">
  <h1>Art Gallery</h1>
  <p>Explore our best artworks and customer experiences</p>
</div>

<!-- FEATURED -->
<div class="featured">
  <h2>Featured Artwork</h2>
  <img src="card2.jpg">
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="card2.jpg">
  <img src="card3.jpeg">
  <img src="cart1.webp">
  <img src="card2.jpg">
</div>

<!-- REVIEWS -->
<div class="reviews">
  <h2>Customer Reviews</h2>

  <div class="review-box">⭐️⭐️⭐️⭐️⭐️ Rihaan: Amazing artwork!</div>
  <div class="review-box">⭐️⭐️⭐️⭐️⭐️ Sara: Loved the quality!</div>

  <div id="newReviews"></div>
</div>

<!-- FORM -->
<div class="form">
  <h2>Leave a Review</h2>
  
  <input type="text" id="name" placeholder="Your Name"><br>
  <textarea id="review" placeholder="Write your review"></textarea><br>
  
  <button onclick="addReview()">Submit</button>
</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("show");
}

/* REVIEW */
function addReview(){
  let name = document.getElementById("name").value;
  let review = document.getElementById("review").value;

  if(name === "" || review === "") return;

  let div = document.createElement("div");
  div.classList.add("review-box");
  div.innerText = "⭐️⭐️⭐️⭐️⭐️ " + name + ": " + review;

  document.getElementById("newReviews").appendChild(div);

  document.getElementById("name").value = "";
  document.getElementById("review").value = "";
}

</script>

</body>
</html>
