<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - NK Art Store</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Lucida Bright";

}

.logo {
  display: flex;
  align-items: center;
}

.logo img {
  width: 45px;
  margin-right: 10px;
}

.logo::after {
  content: "NK Art Store";
  font-size: 18px;
  font-weight: bold;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  color: white;
  z-index: 1000;
}
/* ===== NAVBAR LINKS TRANSITION ===== */
.navbar nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  font-size: 14px;
  position: relative;
  transition: all 0.3s ease;
  padding: 5px 0;
}

/* Hover color + lift effect */
.navbar nav a:hover {
  color: #f7110d;
  transform: translateY(-3px);
}

/* Underline animation effect */
.navbar nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 0%;
  height: 2px;
  background: darkred;
  transition: width 0.3s ease;
}

/* Expand underline on hover */
.navbar nav a:hover::after {
  width: 100%;
}


/* HEADER */
.header {
  text-align: center;
  padding: 40px;
  margin-top: 100px;
}

.header h1 {
  font-size: 2.2rem;
  color: #580908;
}
.header p{
  font-family:Verdana, Geneva, Tahoma, sans-serif;
}

/* FEATURED ART */
.featured {
  padding: 30px;
  text-align: center;
  text-shadow: 2px 2px 5px rgba(229, 8, 8, 0.5);
  font-size: 20px;
 
}


.featured img {
  width: 80%;
  max-width: 600px;
  border-radius: 10px;
}

/* GALLERY GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* REVIEWS */
.reviews {
  background: #f5f5f5;
  padding: 40px;
  text-align: center;
}

.review-box {
  background: white;
  padding: 15px;
  margin: 10px auto;
  max-width: 400px;
  border-radius: 10px;
}

/* FORM */
.form {
  padding: 40px;
  text-align: center;
}

.form input, .form textarea {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  margin: 10px 0;
}

.form button {
  padding: 10px 20px;
  background: darkred;
  color: white;
  border: none;
  cursor: pointer;
}
/* ================= RESPONSIVE ================= */

/* Tablet */
@media (max-width: 992px) {

  .navbar {
    padding: 15px 20px;
  }

  .header {
    padding: 25px;
  }

  .featured img {
    width: 90%;
  }

  .gallery {
    grid-template-columns: repeat(2, 1fr); /* 2 per row */
  }

  .review-box {
    max-width: 90%;
  }
}

/* Mobile */
@media (max-width: 600px) {

  /* Navbar */
  .navbar {
    flex-direction: column;
    align-items: flex-start;
  }

  .navbar div {
    margin-top: 10px;
  }

  .navbar a {
    margin-left: 0;
    margin-right: 15px;
  }

  /* Header */
  .header h1 {
    font-size: 1.6rem;
  }

  .header p {
    font-size: 14px;
  }

  /* Featured */
  .featured img {
    width: 100%;
  }

  /* Gallery */
  .gallery {
    grid-template-columns: 1fr; /* 1 per row */
  }

  /* Reviews */
  .reviews {
    padding: 20px;
  }

  .review-box {
    width: 100%;
  }

  /* Form */
  .form input,
  .form textarea {
    width: 95%;
  }
}

/* RESPONSIVE */
@media (max-width:600px){
  .navbar {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">
    <img src="Black and White Modern Personal Logo.png" alt="NK Art Logo">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="original.html">Original</a>
    <a href="gallery.html">Gallery</a>
    <a href="canvas.html">Canvas</a>
    <a href="about.html">About</a>
  </nav>
</header>

<!-- HEADER -->
<div class="header">
  <h1>Art Gallery</h1>
  <p>Explore our best artworks and customer experiences</p>
</div>

<!-- FEATURED ART -->
<div class="featured">
  <h2>Featured Artwork</h2>
  <img src="card2.jpg">
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="card2.jpg">
  <img src="card3.jpeg">
  <img src="cart1.webp">
  <img src="card2.jpg">
</div>

<!-- REVIEWS -->
<div class="reviews">
  <h2>Customer Reviews</h2>

  <div class="review-box">⭐️⭐️⭐️⭐️⭐️Rihaan: Amazing artwork!</div>
  <div class="review-box">⭐️⭐️⭐️⭐️⭐️Sara: Loved the quality!</div>

  <div id="newReviews"></div>
</div>

<!-- REVIEW FORM -->
<div class="form">
  <h2>Leave a Review</h2>
  
  <input type="text" id="name" placeholder="Your Name"><br>
  <textarea id="review" placeholder="Write your review"></textarea><br>
  
  <button onclick="addReview()">Submit</button>
</div>

<script>

function addReview(){
  let name = document.getElementById("name").value;
  let review = document.getElementById("review").value;

  if(name === "" || review === "") return;

  let newReview = document.createElement("div");
  newReview.classList.add("review-box");
  newReview.innerText = "⭐️⭐️⭐️⭐️⭐️ " + name + ": " + review;

  document.getElementById("newReviews").appendChild(newReview);

  document.getElementById("name").value = "";
  document.getElementById("review").value = "";
}

</script>

</body>
</html>
