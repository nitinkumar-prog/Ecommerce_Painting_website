<!-- Navbar -->
<header class="navbar">
  <div class="logo">
    <img src="Black and White Modern Personal Logo.png" alt="NK Art Logo">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="original.html">Original</a>

<section class="products">

      <img src="cart1.webp">

      <img src="card2.jpg">
      <div class="card-info">
        <p>Indian Women</p>

      </div>
     <button onclick="addToCart('Indian Women', 4099)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="card3.jpeg">
      <div class="card-info">
        <p>Beautiful Landscape</p>
        <span>₹4099</span>
      </div>
      <button onclick="addToCart('Beautiful Landscape', 4099)">Add to Cart</button>
