<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Original Paintings</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family:"Lucida Bright";
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  color: white;
  z-index: 1000;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
}

.logo img {
  width: 45px;
  margin-right: 10px;
}

.logo::after {
  content: "NK Art Store";
  font-size: 18px;
  font-weight: bold;
  color: white;
}

/* NAV LINKS */
.nav-links {
  display: flex;
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  position: relative;
  transition: 0.3s;
}

.nav-links a:hover {
  color: red;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 25px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px){

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    background: black;
    flex-direction: column;
    display: none;
  }

  .nav-links a {
    padding: 15px;
    border-top: 1px solid #333;
    margin: 0;
  }

  .nav-links.show {
    display: flex;
  }
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
  margin-top: 100px;
}

.header p {
  color: darkred;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
  padding: 20px;
}

@media (max-width: 600px) {
  .gallery {
    grid-template-columns: 1fr;
  }
}

/* CARD */
.card {
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTON */
button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.details {
  background: #555;
  color: white;
}

.details:hover {
  background: #333;
  transform: scale(1.05);
}

.cart {
  background: darkred;
  color: white;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

.close {
  float: right;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

  <div class="logo">
    <img src="Black and White Modern Personal Logo.png">
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="original.html">Original</a>
    <a href="gallery.html">Gallery</a>
    <a href="canvas.html">Canvas</a>
    <a href="about.html">About</a>
  </nav>

</header>

<!-- HEADER -->
<div class="header">
  <h1>Original Paintings</h1>
  <p>✔ 100% Original Handmade | ❌ No Duplicate Prints</p>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="card">
    <img src="card2.jpg">
    <h3>Indian Woman</h3>
    <p>₹2200</p>
    <button class="cart" onclick="addToCart('Indian Woman',2200)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="card3.jpeg">
    <h3>Oil Pastel</h3>
    <p>₹1800</p>
    <button class="cart" onclick="addToCart('Oil Pastel',1800)">Add to Cart</button>
  </div>

</div>

<script>

/* MENU TOGGLE */
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("show");
}

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added to cart 🛒");
}

</script>

</body>
</html>
