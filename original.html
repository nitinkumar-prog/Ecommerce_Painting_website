<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family:"Lucida Bright";
}
img {
  max-width: 100%;
  height: auto;
}

/* NAVBAR */
.logo {
  display: flex;
  align-items: center;
}

.logo img {
  width: 45px;
  margin-right: 10px;
}

.logo::after {
  content: "NK Art Store";
  font-size: 18px;
  font-weight: bold;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  color: white;
  z-index: 1000;
}
/* ===== NAVBAR LINKS TRANSITION ===== */
.navbar nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  font-size: 14px;
  position: relative;
  transition: all 0.3s ease;
  padding: 5px 0;
}

/* Hover color + lift effect */
.navbar nav a:hover {
  color: #f7110d;
  transform: translateY(-3px);
}

/* Underline animation effect */
.navbar nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 0%;
  height: 2px;
  background: darkred;
  transition: width 0.3s ease;
}

/* Expand underline on hover */
.navbar nav a:hover::after {
  width: 100%;
}




/* HEADER */
.header {
  text-align: center;
  padding: 30px;
  margin-top: 100px;
}

.header p {
  color: darkred;
}

/* GALLERY */
/* .gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  padding: 20px;
  gap: 20px;
} */
 .gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /*  2 cards per row */
  gap: 25px;
  padding: 20px;
}
@media (max-width: 600px) {
  .gallery {
    grid-template-columns: 1fr;  /* 👈 1 card per row */
  }
}

/* CARD */
.card {
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTONS */
.buttons {
  margin-top: 10px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.details {
  background: #555;
  color: white;
}
.details:hover {
  background: #333;          /* darker shade */
  transform: scale(1.05);    /* thoda zoom */
  transition: 0.3s;
}

.cart {
  background: darkred;
  color: white;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

/* ORDER BUTTON */
.order-btn {
  background: darkred;
  color: white;
  margin-top: 10px;
}

/* RESPONSIVE */
@media (max-width:600px){
  .navbar {
    flex-direction: column;
  }
}

</style>
</head>
