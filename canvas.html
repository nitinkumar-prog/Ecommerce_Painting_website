<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Paintings</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

img {
  max-width: 100%;
  height: auto;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
}

.logo img {
  width: 45px;
  margin-right: 10px;
}

.logo::after {
  content: "NK Art Store";
  font-size: 18px;
  font-weight: bold;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  color: white;
  z-index: 1000;
}

/* NAV LINKS */
.nav-links {
  display: flex;
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  position: relative;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #f7110d;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 25px;
  cursor: pointer;
}

/* MOBILE NAV */
@media (max-width: 768px){

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    background: black;
    flex-direction: column;
    display: none;
  }

  .nav-links a {
    padding: 15px;
    border-top: 1px solid #333;
    margin: 0;
  }

  .nav-links.show {
    display: flex;
  }
}

/* HEADER */
.header {
  height: 60vh;
  background: url('bgcanva.avif') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.header::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(15,15,15,0.5);
}

.overlay-text {
  position: relative;
  text-align: center;
}

.overlay-text h1 {
  color: darkred;
  font-size: 2.5rem;
  text-shadow: 2px 2px 5px white;
}

.overlay-text p {
  color: #8b0000;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 30px;
}

.card {
  border: 1px solid #ddd;
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
  padding-bottom: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  height: 220px;
  object-fit: cover;
}

.card p {
  color: darkred;
}

/* BUTTON */
.card button {
  padding: 8px 15px;
  background: darkred;
  color: white;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

/* RESPONSIVE */
@media (max-width: 992px) {
  .gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .gallery {
    grid-template-columns: 1fr;
  }

  .overlay-text h1 {
    font-size: 1.6rem;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

  <div class="logo">
    <img src="Black and White Modern Personal Logo.png">
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="original.html">Original</a>
    <a href="gallery.html">Gallery</a>
    <a href="canvas.html">Canvas</a>
    <a href="about.html">About</a>
  </nav>

</header>

<!-- HEADER -->
<div class="header">
  <div class="overlay-text">
    <h1>Canvas Paintings</h1>
    <p>Premium handmade canvas artworks</p>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="card">
    <img src="card2.jpg">
    <h3>Silent Forest</h3>
    <p>₹2200</p>
    <button onclick="openDetails('Silent Forest','₹2200','Acrylic')">View Details</button>
  </div>

  <div class="card">
    <img src="card3.jpeg">
    <h3>Golden Sunset</h3>
    <p>₹1800</p>
    <button onclick="openDetails('Golden Sunset','₹1800','Oil')">View Details</button>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="title"></h2>
    <p id="price"></p>
    <p id="desc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* NAV */
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("show");
}

/* MODAL */
function openDetails(title, price, desc){
  document.getElementById("title").innerText = title;
  document.getElementById("price").innerText = price;
  document.getElementById("desc").innerText = desc;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
